name: Publish to TestPyPI

on:
  push:
    paths-ignore:
      - 'docs/**'
    tags:
      - 'v*'

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish --verbose --publish-url https://test.pypi.org/legacy/
